<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G-DRAGON Surprise Player</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
  background:#000;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

.container{
  width:100%;
  max-width:500px;
  text-align:center;
}

.artist{
  font-size:16px;
  letter-spacing:6px;
  color:#999;
  margin-bottom:20px;
}

.song{
  font-size:34px;
  font-weight:700;
  margin-bottom:25px;
  min-height:80px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 20px;
}

.vinyl-wrapper{
  width:280px;
  height:280px;
  margin:0 auto 25px;
  position:relative;
  cursor:pointer;
}

.vinyl{
  width:100%;
  height:100%;
  border-radius:50%;
  position:relative;
  overflow:hidden;
  animation:spin 4s linear infinite;
  animation-play-state:paused;
}

.vinyl.playing{
  animation-play-state:running;
}

.album-art{
  position:absolute;
  inset:0;
  border-radius:50%;
  background-size:cover;
  background-position:center;
}

.grooves{
  position:absolute;
  inset:0;
  border-radius:50%;
  background:
  repeating-radial-gradient(
    circle,
    transparent 0,
    transparent 3px,
    rgba(0,0,0,.18) 4px,
    rgba(0,0,0,.18) 5px
  );
  pointer-events:none;
}

.center-label{
  position:absolute;
  width:88px;
  height:88px;
  border-radius:50%;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background-size:cover;
  background-position:center;
  border:3px solid #111;
  z-index:2;
  box-shadow:0 0 0 2px #333;
}

.spindle{
  position:absolute;
  width:10px;
  height:10px;
  border-radius:50%;
  background:#111;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:3;
  border:1px solid #666;
}

.subtitle{
  color:#777;
  font-size:13px;
  letter-spacing:3px;
  margin-bottom:25px;
}

.random-btn{
  border:none;
  padding:18px 35px;
  border-radius:999px;
  cursor:pointer;
  font-size:16px;
  font-weight:700;
  background:#fff;
  color:#000;
}

audio{
  display:none;
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="container">

  <div class="artist">G-DRAGON</div>

  <div class="song" id="songName">🌼 SURPRISE ME</div>

  <div class="vinyl-wrapper" id="vinylWrapper">
    <div class="vinyl" id="vinyl">
      <div class="album-art" id="albumArt"></div>
      <div class="grooves"></div>
      <div class="center-label" id="centerLabel"></div>
      <div class="spindle"></div>
    </div>
  </div>

  <div class="subtitle">SCAN • TAP • DISCOVER</div>

  <button class="random-btn" onclick="surpriseMe()">🌼 SURPRISE ME</button>

  <audio id="audioPlayer"></audio>

</div>

<script>
const gdImages=[
  "images/Gdragon1.jpg",
  "images/Gdragon2.jpg"
];

const songs=[
{title:"A Boy",file:"music/A_Boy-GDragon.mp3",images:["images/Heartbreaker1.jpg","images/Heartbreaker2.jpg"]},
{title:"BLACK",file:"music/Black-GDragon.mp3",images:["images/Coup_d'Etat1.jpg","images/Coup_d'Etat2.jpg"]},
{title:"Breathe",file:"music/Breathe-GDragon.mp3",images:["images/Heartbreaker1.jpg","images/Heartbreaker2.jpg"]},
{title:"Bullshit",file:"music/Bullshit-GDragon.mp3",images:["images/Untitled,(2014)1.jpg","images/Untitled,(2014)2.jpg"]},
{title:"COUP D'ETAT",file:"music/Coup_d'Etat-GDragon.mp3",images:["images/Coup_d'Etat1.jpg","images/Coup_d'Etat2.jpg"]},
{title:"Crayon",file:"music/Crayon-GDragon.mp3",images:["images/OneOfAKind1.jpg","images/OneOfAKind2.jpg"]},
{title:"CROOKED",file:"music/Crooked-GDragon.mp3",images:["images/Coup_d'Etat1.jpg","images/Coup_d'Etat2.jpg"]},
{title:"Heartbreaker",file:"music/Heartbreaker-GDragon.mp3",images:["images/Heartbreaker1.jpg","images/Heartbreaker2.jpg"]},
{title:"HOME SWEET HOME",file:"music/Home_Sweet_Home-GDragon.mp3",images:["images/ubermensch1.jpg","images/ubermensch2.png"]},
{title:"Missing You",file:"music/Missing_You-GDragon.mp3",images:["images/OneOfAKind1.jpg","images/OneOfAKind2.jpg"]},
{title:"One Of A Kind",file:"music/One_Of_A_Kind-GDragon.mp3",images:["images/OneOfAKind1.jpg","images/OneOfAKind2.jpg"]},
{title:"POWER",file:"music/Power-GDragon.mp3",images:["images/Power1.jpg","images/Power2.jpg"]},
{title:"R.O.D.",file:"music/R.O.D-GDragon.mp3",images:["images/Coup_d'Etat1.jpg","images/Coup_d'Etat2.jpg"]},
{title:"That XX",file:"music/That_XX-GDragon.mp3",images:["images/OneOfAKind1.jpg","images/OneOfAKind2.jpg"]},
{title:"Today",file:"music/Today-GDragon.mp3",images:["images/OneOfAKind1.jpg","images/OneOfAKind2.jpg"]},
{title:"TOO BAD",file:"music/Too_Bad-GDragon.mp3",images:["images/ubermensch1.jpg","images/ubermensch2.png"]},
{title:"Untitled, 2014",file:"music/Untitled,2014-GDragon.mp3",images:["images/Untitled,(2014)1.jpg","images/Untitled,(2014)2.jpg"]},
{title:"WHO YOU?",file:"music/Who_You_-GDragon.mp3",images:["images/Coup_d'Etat1.jpg","images/Coup_d'Etat2.jpg"]},
{title:"Window",file:"music/Window-GDragon.mp3",images:["images/Heartbreaker1.jpg","images/Heartbreaker2.jpg"]},
{title:"Without You",file:"music/Without_You-GDragon.mp3",images:["images/OneOfAKind1.jpg","images/OneOfAKind2.jpg"]}
];

const player=document.getElementById("audioPlayer");
const songName=document.getElementById("songName");
const vinyl=document.getElementById("vinyl");
const vinylWrapper=document.getElementById("vinylWrapper");
const albumArt=document.getElementById("albumArt");
const centerLabel=document.getElementById("centerLabel");

let currentSong=null;
let albumMode=true;
let imageIndex=0;
let imageTimer=null;

let playlist=[];
let playlistIndex=0;
let playlistStarted=false;

function shuffle(array){
  const arr=[...array];
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function buildPlaylist(){
  playlist=shuffle(songs);
  playlistIndex=0;
}

function currentImages(){
  return (albumMode && currentSong)
    ? currentSong.images
    : gdImages;
}

function updateImage(){
  const imgs=currentImages();

  albumArt.style.backgroundImage=
    `url('${imgs[imageIndex % imgs.length]}')`;

  const labelImgs=currentSong
    ? currentSong.images
    : gdImages;

  centerLabel.style.backgroundImage=
    `url('${labelImgs[0]}')`;
}

function startImageRotation(){
  clearInterval(imageTimer);

  imageTimer=setInterval(()=>{
    imageIndex=(imageIndex+1)%2;
    updateImage();
  },5000);
}

function toggleImage(){
  imageIndex=(imageIndex+1)%2;
  updateImage();
}

function loadSong(song){

  currentSong=song;
  imageIndex=0;

  songName.innerText="🌼 Loading...";

  player.src=song.file;
  player.load();

  player.oncanplaythrough=()=>{
    songName.innerText=song.title;

    updateImage();
    startImageRotation();

    player.play().catch(()=>{});

    player.oncanplaythrough=null;
  };
}

function surpriseMe(){

  if(!playlistStarted){
    buildPlaylist();
    playlistStarted=true;
  }

  albumMode=true;

  loadSong(playlist[playlistIndex]);
}

player.addEventListener("ended",()=>{

  if(!playlistStarted) return;

  playlistIndex++;

  if(playlistIndex>=playlist.length){
    buildPlaylist();
  }

  loadSong(playlist[playlistIndex]);
});

player.addEventListener("play",()=>{
  vinyl.classList.add("playing");
});

player.addEventListener("pause",()=>{
  vinyl.classList.remove("playing");
});

let holdTimer=null;
let holdTriggered=false;
let tapCount=0;
let tapTimer=null;

function startHold(){

  holdTriggered=false;

  holdTimer=setTimeout(()=>{

    holdTriggered=true;

    albumMode=!albumMode;
    imageIndex=0;

    updateImage();

    songName.innerText=
      albumMode
      ? "💿 ALBUM MODE"
      : "👑 G-DRAGON MODE";

    setTimeout(()=>{
      if(currentSong){
        songName.innerText=currentSong.title;
      }
    },2000);

  },1000);
}

function stopHold(){
  clearTimeout(holdTimer);
}

function handleTap(){

  tapCount++;

  clearTimeout(tapTimer);

  tapTimer=setTimeout(()=>{

    if(tapCount===1){

      if(!currentSong) return;

      if(player.paused){
        player.play().catch(()=>{});
      }else{
        player.pause();
      }

    }else{

      toggleImage();

    }

    tapCount=0;

  },250);
}

vinylWrapper.addEventListener("mousedown",startHold);

vinylWrapper.addEventListener("mouseup",()=>{
  stopHold();

  if(holdTriggered) return;

  handleTap();
});

vinylWrapper.addEventListener("mouseleave",stopHold);

vinylWrapper.addEventListener("touchstart",(e)=>{
  e.preventDefault();
  startHold();
},{passive:false});

vinylWrapper.addEventListener("touchend",(e)=>{
  e.preventDefault();

  stopHold();

  if(holdTriggered) return;

  handleTap();
},{passive:false});

vinylWrapper.addEventListener("touchmove",()=>{
  stopHold();
},{passive:true});

updateImage();
</script>

</body>
</html>
